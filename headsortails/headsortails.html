<body>
    <h1>Heads or Tails</h1>
    <button onclick="flip()">Toss Coin</button>
    <script>
        function flip(){
            var x= Math.floor(Math.random()*2);

            if(x==1){
                alert("Heads");
            }
            else{
                alert("Tails");
            }
        }
    </script>
