<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="look.css">
</head>
<body>
    <h1>Catrandomizer</h1>
    <p>This is my randomizer for the boardgame "Settlers of Catan". Simply click the button and it will generate a board according to the games rules.</p>
<button onclick="helloworld()">Generate</button>
        <script>function helloworld(){

        const straw=new Image(220, 200);
        straw.src="img/straw.png";
        

        const steppe=new Image(220, 200);
        steppe.src="img/steppe.png";
        

        for (let i=1; i<2;i++){
            document.body.appendChild(straw)+i;
            document.body.appendChild(steppe)+i;
        }
        
        }</script>
        

</body>
</html>
